<html>
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Bienvenidos... </h1>
        <p>Aprenderemos MVC y Capas</p>
        <nav class="navbar navbar-light bg-light">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Biblioteca Uptc</a>
            </div>
        </nav>
        
        <div class="container">
            <div class="row">
                <div class="col-md-3"></div>
                <div class="col-md-3"></div>
                <div class="col-md-3"></div>
                <div class="col-md-3"></div>
            </div>
        </div>

        <div class="card">
            <img src="">
            <div class="card-body">
                <h5 class="card-title">Metamodelo</h5>
                <p class ="card-text">Some quick example to build</p>
                <a href="#" class="btn btn-primary">Ver detalles</a>
            </div>
        </div>

        <div class="container mt-4 my-style-destacados">
            <div class="row">
                <div th:each="libro : ${libros}" class="col-md-3 mb-4">
                    <div class="card">
                        <img th:src="${libro.imageUrl}" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 th:text="${libro.name}" class="card-title"></h5>
                            <p th:text="${libro.description}" class="card-text"></p>
                            <a href="#" class="btn btn-primary">Ver detalles</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
